# $schema: ../../schemas/operator.json
name: $reduce
link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/
minVersion: '3.4'
type:
  - resolvesToAny
encode: object
description: |
  Applies an expression to each element in an array and combines them into a single value.
arguments:
  - name: input
    type:
      - resolvesToArray
    description: |
      Can be any valid expression that resolves to an array.
      If the argument resolves to a value of null or refers to a missing field, $reduce returns null.
      If the argument does not resolve to an array or null nor refers to a missing field, $reduce returns an error.
  - name: initialValue
    type:
      - expression
    description: |
      The initial cumulative value set before in is applied to the first element of the input array.
  - name: in
    type:
      - expression
      - expressionMap
    syntheticVariables:
      - name: this
        description: |
          The variable that refers to the element being processed. Renamed via the as argument (MongoDB 8.3+).
      - name: value
        description: |
          The variable that represents the cumulative value of the expression. Renamed via the valueAs argument (MongoDB 8.3+).
    description: |
      A valid expression that $reduce applies to each element in the input array in left-to-right order. Wrap the input value with $reverseArray to yield the equivalent of applying the combining expression from right-to-left.
      During evaluation of the in expression, two variables will be available:
      - value is the variable that represents the cumulative value of the expression. Use valueAs (MongoDB 8.3+) to specify a custom name.
      - this is the variable that refers to the element being processed. Use as (MongoDB 8.3+) to specify a custom name.
  - name: as
    type:
      - string
    optional: true
    minVersion: '8.3'
    description: |
      A name for the variable that represents each individual element of the input array.
      If no name is specified, the variable name defaults to this.
  - name: valueAs
    type:
      - string
    optional: true
    minVersion: '8.3'
    description: |
      A name for the variable that represents the cumulative value of the expression.
      If no name is specified, the variable name defaults to value.
  - name: arrayIndexAs
    type:
      - string
    optional: true
    minVersion: '8.3'
    description: |
      A name for the variable that represents the index of the current element in
      the input array. If specified, this variable is available within the in expression.
tests:
  - name: Multiplication
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#multiplication
    pipeline:
      - $group:
          _id: $experimentId
          probabilityArr:
            $push: $probability
      - $project:
          description: 1
          results:
            $reduce:
              input: $probabilityArr
              initialValue: 1
              in:
                $multiply:
                  - $$value
                  - $$this
    schema:
      events:
        _id:
          types:
            - bsonType: Number
        type:
          types:
            - bsonType: String
        experimentId:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        eventNum:
          types:
            - bsonType: Number
        probability:
          types:
            - bsonType: Number
  - name: Discounted Merchandise
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#discounted-merchandise
    pipeline:
      - $project:
          discountedPrice:
            $reduce:
              input: $discounts
              initialValue: $price
              in:
                $multiply:
                  - $$value
                  - $subtract:
                      - 1
                      - $$this
    schema:
      clothes:
        _id:
          types:
            - bsonType: Number
        productId:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        color:
          types:
            - bsonType: String
        size:
          types:
            - bsonType: String
        price:
          types:
            - bsonType: Number
        discounts:
          types:
            - bsonType: Array
              types:
                - bsonType: Number
  - name: String Concatenation
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#string-concatenation
    pipeline:
      # Filter to return only non-empty arrays
      - $match:
          hobbies:
            $gt: []
      - $project:
          name: 1
          bio:
            $reduce:
              input: $hobbies
              initialValue: 'My hobbies include:'
              in:
                $concat:
                  - $$value
                  - $cond:
                      if:
                        $eq:
                          - $$value
                          - 'My hobbies include:'
                      then: ' '
                      else: ', '
                  - $$this
    schema:
      people:
        _id:
          types:
            - bsonType: Number
        name:
          types:
            - bsonType: String
        hobbies:
          types:
            - bsonType: Array
              types:
                - bsonType: String
  - name: Array Concatenation
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#array-concatenation
    pipeline:
      - $project:
          collapsed:
            $reduce:
              input: $arr
              initialValue: []
              in:
                $concatArrays:
                  - $$value
                  - $$this
    schema:
      matrices:
        _id:
          types:
            - bsonType: Number
        arr:
          types:
            - bsonType: Array
              types:
                - bsonType: Array
                  types:
                    - bsonType: Number
  - name: Use as, valueAs, and arrayIndexAs
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#use-as--valueas--and-arrayindexas
    pipeline:
      - $project:
          _id: 0
          name: 1
          text:
            $reduce:
              input: $hobbies
              initialValue: 'My hobbies include:'
              in:
                $concat:
                  - $$accumulatedText
                  - ' '
                  - $toString:
                      $add:
                        - $$myIndex
                        - 1
                  - ') '
                  - $$hobby
              as: hobby
              valueAs: accumulatedText
              arrayIndexAs: myIndex
    schema:
      people:
        _id:
          types:
            - bsonType: Number
        name:
          types:
            - bsonType: String
        hobbies:
          types:
            - bsonType: Array
              types:
                - bsonType: String
  - name: Computing a Multiple Reductions
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/reduce/#computing-a-multiple-reductions
    pipeline:
      - $project:
          results:
            $reduce:
              input: $arr
              initialValue: []
              in:
                collapsed:
                  $concatArrays:
                    - $$value.collapsed
                    - $$this
                firstValues:
                  $concatArrays:
                    - $$value.firstValues
                    - $slice:
                        - $$this
                        - 1
    schema:
      events:
        _id:
          types:
            - bsonType: Number
        type:
          types:
            - bsonType: String
        experimentId:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        eventNum:
          types:
            - bsonType: Number
        probability:
          types:
            - bsonType: Number
