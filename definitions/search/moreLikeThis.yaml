# $schema: ../../schemas/operator.json
name: moreLikeThis
link: https://www.mongodb.com/docs/atlas/atlas-search/moreLikeThis/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The moreLikeThis operator returns documents similar to input documents.
  The moreLikeThis operator allows you to build features for your applications
  that display similar or alternative results based on one or more given documents.
arguments:
  - name: like
    type:
      - object
      - array       # of object
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: Single Document with Multiple Fields
    link: https://www.mongodb.com/docs/atlas/atlas-search/morelikethis/#example-1--single-document-with-multiple-fields
    pipeline:
      - $search:
          moreLikeThis:
            like:
              title: The Godfather
              genres: action
      - $limit: 5
      - $project:
          _id: 0
          title: 1
          released: 1
          genres: 1
    schema:
      movies: &ref_0
        _id:
          types:
            - bsonType: Document
              fields:
                $oid:
                  types:
                    - bsonType: String
        title:
          types:
            - bsonType: String
        year:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        runtime:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        released:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        poster:
          types:
            - bsonType: String
        plot:
          types:
            - bsonType: String
        fullplot:
          types:
            - bsonType: String
        lastupdated:
          types:
            - bsonType: String
        type:
          types:
            - bsonType: String
        directors:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        imdb:
          types:
            - bsonType: Document
              fields:
                rating:
                  types:
                    - bsonType: Document
                      fields:
                        $numberDouble:
                          types:
                            - bsonType: String
                votes:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
                id:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
        cast:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        countries:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Document
                              fields:
                                $numberDouble:
                                  types:
                                    - bsonType: String
                        numReviews:
                          types:
                            - bsonType: Document
                              fields:
                                $numberInt:
                                  types:
                                    - bsonType: String
                lastUpdated:
                  types:
                    - bsonType: Document
                      fields:
                        $date:
                          types:
                            - bsonType: Document
                              fields:
                                $numberLong:
                                  types:
                                    - bsonType: String
        num_mflix_comments:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
  - name: Input Document Excluded in Results
    link: https://www.mongodb.com/docs/atlas/atlas-search/morelikethis/#example-2--input-document-excluded-in-results
    pipeline:
      - $search:
          compound:
            must:
              - moreLikeThis:
                  like:
                    _id: !bson_objectId '573a1396f29313caabce4a9a'
                    genres:
                      - Crime
                      - Drama
                    title: The Godfather
            mustNot:
              - equals:
                  path: _id
                  value: !bson_objectId '573a1396f29313caabce4a9a'
      - $limit: 5
      - $project:
          _id: 1
          title: 1
          released: 1
          genres: 1
    schema:
      movies: *ref_0
  - name: Multiple Analyzers
    link: https://www.mongodb.com/docs/atlas/atlas-search/morelikethis/#example-3--multiple-analyzers
    pipeline:
      - $search:
          compound:
            should:
              - moreLikeThis:
                  like:
                    _id: !bson_objectId '573a1396f29313caabce4a9a'
                    genres:
                      - Crime
                      - Drama
                    title: The Godfather
            mustNot:
              - equals:
                  path: _id
                  value: !bson_objectId '573a1394f29313caabcde9ef'
      - $limit: 10
      - $project:
          title: 1
          genres: 1
          _id: 1
    schema:
      movies: *ref_0
