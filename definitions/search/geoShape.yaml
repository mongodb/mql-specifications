                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        last_review:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        accommodates:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        bedrooms:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        beds:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        number_of_reviews:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        bathrooms:
          types:
            - bsonType: Document
              fields:
                $numberDecimal:
                  types:
                    - bsonType: String
        amenities:
