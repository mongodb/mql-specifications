  - name: Intersect
    link: https://www.mongodb.com/docs/atlas/atlas-search/geoShape/#intersects-example
    pipeline:
      - $search:
          geoShape:
            relation: intersects
            geometry:
              type: MultiPolygon
              coordinates:
                -   -   - [2.16942, 41.40082]
                        - [2.17963, 41.40087]
                        - [2.18146, 41.39716]
                        - [2.15533, 41.40686]
                        - [2.14596, 41.38475]
                        - [2.17519, 41.41035]
                        - [2.16942, 41.40082]
                -   -   - [2.16365, 41.39416]
                        - [2.16963, 41.39726]
                        - [2.15395, 41.38005]
                        - [2.17935, 41.43038]
                        - [2.16365, 41.39416]
            path: address.location
      - $limit: 3
      - $project:
          _id: 0
          name: 1
          address: 1
          score:
            $meta: searchScore
