                    - bsonType: String
                location:
                  types:
                    - bsonType: Document
                      fields:
                        type:
                          types:
                            - bsonType: String
                        coordinates:
                          types:
                            - bsonType: Array
                              types:
                                - bsonType: Document
                                  fields:
                                    $numberDouble:
