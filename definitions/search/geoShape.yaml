# $schema: ../../schemas/operator.json
name: geoShape
link: https://www.mongodb.com/docs/atlas/atlas-search/geoShape/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The geoShape operator supports querying shapes with a relation to a given 
  geometry if indexShapes is set to true in the index definition.
arguments:
  - name: path
    type:
      - searchPath
  - name: relation
    type:
      - string       # contains | disjoint | intersects | within
  - name: geometry
    type:
      - geometry
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: Disjoint
    link: https://www.mongodb.com/docs/atlas/atlas-search/geoShape/#disjoint-example
    pipeline:
      - $search:
          geoShape:
            relation: disjoint
            geometry:
              type: Polygon
              coordinates:
                -   - [-161.323242, 22.512557]
                    - [-152.446289, 22.065278]
                    - [-156.09375, 17.811456]
                    - [-161.323242, 22.512557]
            path: address.location
      - $limit: 3
      - $project:
          _id: 0
          name: 1
          address: 1
          score:
            $meta: searchScore
    schema:
      listingsAndReviews: &ref_0
        _id:
          types:
            - bsonType: String
        listing_url:
          types:
            - bsonType: String
        name:
          types:
            - bsonType: String
        summary:
          types:
            - bsonType: String
        interaction:
          types:
            - bsonType: String
        house_rules:
          types:
            - bsonType: String
        property_type:
          types:
            - bsonType: String
        room_type:
          types:
            - bsonType: String
        bed_type:
          types:
            - bsonType: String
        minimum_nights:
          types:
            - bsonType: String
        maximum_nights:
          types:
            - bsonType: String
        cancellation_policy:
          types:
            - bsonType: String
        last_scraped:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        calendar_last_scraped:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        first_review:
          types:
            - bsonType: Document
              fields:
