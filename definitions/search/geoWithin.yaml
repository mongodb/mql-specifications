        maximum_nights:
          types:
            - bsonType: String
        cancellation_policy:
          types:
            - bsonType: String
        last_scraped:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        calendar_last_scraped:
          types:
            - bsonType: Document
