# $schema: ../../schemas/operator.json
name: geoWithin
link: https://www.mongodb.com/docs/atlas/atlas-search/geoWithin/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The geoWithin operator supports querying geographic points within a given
  geometry. Only points are returned, even if indexShapes value is true in
  the index definition.
arguments:
  - name: path
    type:
      - searchPath
  - name: box
    optional: true
    type:
      - object
  - name: circle
    optional: true
    type:
      - object
  - name: geometry
    optional: true
    type:
      - geometry
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: box
    link: https://www.mongodb.com/docs/atlas/atlas-search/geoWithin/#box-example
    pipeline:
      - $search:
          geoWithin:
            path: address.location
            box:
              bottomLeft:
                type: Point
                coordinates:
                  - 112.467
                  - -55.05
              topRight:
                type: Point
                coordinates:
                  - 168
                  - -9.133
      - $limit: 3
      - $project:
          _id: 0
          name: 1
          address: 1
    schema:
      listingsAndReviews: &ref_0
        _id:
          types:
            - bsonType: String
        listing_url:
          types:
            - bsonType: String
        name:
          types:
            - bsonType: String
        summary:
          types:
            - bsonType: String
        interaction:
          types:
