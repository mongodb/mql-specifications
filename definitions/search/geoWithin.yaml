  - name: circle
    link: https://www.mongodb.com/docs/atlas/atlas-search/geoWithin/#circle-example
    pipeline:
      - $search:
          geoWithin:
            circle:
              center:
                type: Point
                coordinates:
                  - -73.54
                  - 45.54
              radius: 1600
            path: address.location
      - $limit: 3
      - $project:
          _id: 0
          name: 1
          address: 1
    schema:
      listingsAndReviews: *ref_0
  - name: geometry
    link: https://www.mongodb.com/docs/atlas/atlas-search/geoWithin/#geometry-examples
    pipeline:
      - $search:
          geoWithin:
            geometry:
              type: Polygon
              coordinates:
                -   - [-161.323242, 22.512557]
                    - [-152.446289, 22.065278]
                    - [-156.09375, 17.811456]
                    - [-161.323242, 22.512557]
            path: address.location
