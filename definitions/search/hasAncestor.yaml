# $schema: ../../schemas/operator.json
name: hasAncestor
link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasancestor/
minVersion: '8.2'
type:
  - searchOperator
encode: object
description: |
  The `hasAncestor` operator queries an `embeddedDocuments` type field specified in the `ancestorPath`. The `ancestorPath` is a parent of the field specified in the `returnScope`.
arguments:
  - name: ancestorPath
    type:
      - searchPath
  - name: operator
    type:
      - searchOperator
tests:
  - name: Example
    link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasAncestor/#sample-query
    pipeline:
      - $search:
          returnStoredSource: true
          returnScope:
            path: funding_rounds.investments
          hasAncestor:
            ancestorPath: funding_rounds
            operator:
              equals:
                path: funding_rounds.funded_year
                value: 2005
    schema:
      TestCollection:
        mappings:
          types:
            - bsonType: Document
              fields:
                dynamic:
                  types:
                    - bsonType: Boolean
                fields:
                  types:
                    - bsonType: Document
                      fields:
                        funding_rounds:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                fields:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        investments:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: Document
                                                  fields:
                                                    dynamic:
                                                      types:
                                                        - bsonType: Boolean
                                                    storedSource:
                                                      types:
                                                        - bsonType: Document
                                                          fields:
                                                            include:
                                                              types:
                                                                - bsonType: Array
                                                                  types:
                                                                    - bsonType: String
                                                    type:
                                                      types:
                                                        - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
