# $schema: ../../schemas/operator.json
name: hasRoot
link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasroot/
minVersion: '8.2'
type:
  - searchOperator
encode: object
description: |
  The `hasRoot` operator can be used to query root-level fields when you specify the `returnScope` and `returnStoredSource` options.
arguments:
  - name: operator
    type:
      - searchOperator
tests:
  - name: Simple Query
    link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasRoot/#simple-query
    pipeline:
      - $search:
          returnStoredSource: true
          returnScope:
            path: products
          hasRoot:
            operator:
              range:
                path: founded_year
                gte: 2005
                lte: 2010
    schema:
      TestCollection:
        mappings:
          types:
            - bsonType: Document
              fields:
                dynamic:
                  types:
                    - bsonType: Boolean
                fields:
                  types:
                    - bsonType: Document
                      fields:
                        funding_rounds:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                fields:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        investments:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: Document
                                                  fields:
                                                    dynamic:
                                                      types:
                                                        - bsonType: Boolean
                                                    type:
                                                      types:
                                                        - bsonType: String
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
                        products:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
  - name: Multi-Level Query
    link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasRoot/#multi-level-query
    pipeline:
      - $search:
          returnStoredSource: true
          returnScope:
            path: funding_rounds
          hasRoot:
            operator:
              text:
                path: name
                query: Facebook
    schema:
      TestCollection:
        mappings:
          types:
            - bsonType: Document
              fields:
                dynamic:
                  types:
                    - bsonType: Boolean
                fields:
                  types:
                    - bsonType: Document
                      fields:
                        funding_rounds:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                fields:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        investments:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: Document
                                                  fields:
                                                    dynamic:
                                                      types:
                                                        - bsonType: Boolean
                                                    type:
                                                      types:
                                                        - bsonType: String
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
                        products:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
  - name: Compound Query
    link: https://www.mongodb.com/docs/atlas/atlas-search/operators-collectors/hasRoot/#compound-query
    pipeline:
      - $search:
          compound:
            should:
              - embeddedDocument:
                  path: funding_rounds.investments
                  operator:
                    wildcard:
                      path: funding_rounds.investments.financial_org.name
                      query: '*Ventures*'
                      allowAnalyzedField: true
              - hasRoot:
                  operator:
                    wildcard:
                      path: description
                      query: '*network*'
                      allowAnalyzedField: true
          returnScope:
            path: funding_rounds
          returnStoredSource: true
      - $limit: 5
    schema:
      TestCollection:
        mappings:
          types:
            - bsonType: Document
              fields:
                dynamic:
                  types:
                    - bsonType: Boolean
                fields:
                  types:
                    - bsonType: Document
                      fields:
                        funding_rounds:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                fields:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        investments:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: Document
                                                  fields:
                                                    dynamic:
                                                      types:
                                                        - bsonType: Boolean
                                                    type:
                                                      types:
                                                        - bsonType: String
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
                        products:
                          types:
                            - bsonType: Document
                              fields:
                                dynamic:
                                  types:
                                    - bsonType: Boolean
                                storedSource:
                                  types:
                                    - bsonType: Document
                                      fields:
                                        include:
                                          types:
                                            - bsonType: Array
                                              types:
                                                - bsonType: String
                                type:
                                  types:
                                    - bsonType: String
