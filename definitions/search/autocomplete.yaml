# $schema: ../../schemas/operator.json
name: autocomplete
link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The autocomplete operator performs a search for a word or phrase that
  contains a sequence of characters from an incomplete input string. The
  fields that you intend to query with the autocomplete operator must be
  indexed with the autocomplete data type in the collection's index definition.
arguments:
  - name: path
    type:
      - searchPath
  - name: query
    type:
      - string
  - name: tokenOrder
    optional: true
    type:
      - string       # any|sequential
  - name: fuzzy
    optional: true
    type:
      - object
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: Basic
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#basic-example
    pipeline:
      - $search:
          autocomplete:
            query: 'off'
            path: title
      - $limit: 10
      - $project:
          _id: 0
          title: 1
    schema:
      movies: &ref_0
        _id:
          types:
            - bsonType: Document
              fields:
                $oid:
                  types:
                    - bsonType: String
        title:
          types:
            - bsonType: String
        year:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        runtime:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        released:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        poster:
          types:
            - bsonType: String
        plot:
          types:
            - bsonType: String
        fullplot:
          types:
            - bsonType: String
        lastupdated:
          types:
            - bsonType: String
        type:
          types:
            - bsonType: String
        directors:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        imdb:
          types:
            - bsonType: Document
              fields:
                rating:
                  types:
                    - bsonType: Document
                      fields:
                        $numberDouble:
                          types:
                            - bsonType: String
                votes:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
                id:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
        cast:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        countries:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Document
                              fields:
                                $numberDouble:
                                  types:
                                    - bsonType: String
                        numReviews:
                          types:
                            - bsonType: Document
                              fields:
                                $numberInt:
                                  types:
                                    - bsonType: String
                lastUpdated:
                  types:
                    - bsonType: Document
                      fields:
                        $date:
                          types:
                            - bsonType: Document
                              fields:
                                $numberLong:
                                  types:
                                    - bsonType: String
        num_mflix_comments:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
  - name: Fuzzy
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#fuzzy-example
    pipeline:
      - $search:
          autocomplete:
            query: pre
            path: title
            fuzzy:
              maxEdits: 1
              prefixLength: 1
              maxExpansions: 256
      - $limit: 10
      - $project:
          _id: 0
          title: 1
    schema:
      movies: *ref_0
  - name: Token Order any
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#simple-any-example
    pipeline:
      - $search:
          autocomplete:
            query: men with
            path: title
            tokenOrder: any
      - $limit: 4
      - $project:
          _id: 0
          title: 1
    schema:
      movies: *ref_0
  - name: Token Order sequential
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#simple-sequential-example
    pipeline:
      - $search:
          autocomplete:
            query: men with
            path: title
            tokenOrder: sequential
      - $limit: 4
      - $project:
          _id: 0
          title: 1
    schema:
      movies: *ref_0
  - name: Highlighting
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#highlighting-example
    pipeline:
      - $search:
          autocomplete:
            query: ger
            path: title
          highlight:
            path: title
      - $limit: 5
      - $project:
          score:
            $meta: searchScore
          _id: 0
          title: 1
          highlights:
            $meta: searchHighlights
    schema:
      movies: *ref_0
  - name: Across Multiple Fields
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#search-across-multiple-fields
    pipeline:
      - $search:
          compound:
            should:
              - autocomplete:
                  query: inter
                  path: title
              - autocomplete:
                  query: inter
                  path: plot
            minimumShouldMatch: 1
      - $limit: 10
      - $project:
          _id: 0
          title: 1
          plot: 1
    schema:
      movies: *ref_0
