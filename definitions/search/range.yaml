# $schema: ../../schemas/operator.json
name: range
link: https://www.mongodb.com/docs/atlas/atlas-search/range/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The range operator supports querying and scoring numeric, date, and string values.
  You can use this operator to find results that are within a given numeric, date, objectId, or letter (from the English alphabet) range.
arguments:
  - name: path
    type:
      - searchPath
  - name: gt
    optional: true
    type:
      - date
      - number
      - string
      - objectId
  - name: gte
    optional: true
    type:
      - date
      - number
      - string
      - objectId
  - name: lt
    optional: true
    type:
      - date
      - number
      - string
      - objectId
  - name: lte
    optional: true
    type:
      - date
      - number
      - string
      - objectId
  - name: score
    optional: true
    type:
      - searchScore
  - name: doesNotAffect
    optional: true
    type:
      - string
      - array       # of string
tests:
  - name: Number gte lte
    link: https://www.mongodb.com/docs/atlas/atlas-search/range/#number-example
    pipeline:
      - $search:
          range:
            path: runtime
            gte: 2
            lte: 3
      - $limit: 5
      - $project:
          _id: 0
          title: 1
          runtime: 1
    schema:
      movies: &ref_0
        _id:
          types:
            - bsonType: Document
              fields:
                $oid:
                  types:
                    - bsonType: String
        title:
          types:
            - bsonType: String
        year:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        runtime:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        released:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        poster:
          types:
            - bsonType: String
        plot:
          types:
            - bsonType: String
        fullplot:
          types:
            - bsonType: String
        lastupdated:
          types:
            - bsonType: String
        type:
          types:
            - bsonType: String
        directors:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        imdb:
          types:
            - bsonType: Document
              fields:
                rating:
                  types:
                    - bsonType: Document
                      fields:
                        $numberDouble:
                          types:
                            - bsonType: String
                votes:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
                id:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
        cast:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        countries:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Document
                              fields:
                                $numberDouble:
                                  types:
                                    - bsonType: String
                        numReviews:
                          types:
                            - bsonType: Document
                              fields:
                                $numberInt:
                                  types:
                                    - bsonType: String
                lastUpdated:
                  types:
                    - bsonType: Document
                      fields:
                        $date:
                          types:
                            - bsonType: Document
                              fields:
                                $numberLong:
                                  types:
                                    - bsonType: String
        num_mflix_comments:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
  - name: Number lte
    link: https://www.mongodb.com/docs/atlas/atlas-search/range/#number-example
    pipeline:
      - $search:
          range:
            path: runtime
            lte: 2
      - $limit: 5
      - $project:
          _id: 0
          title: 1
          runtime: 1
          score:
            $meta: searchScore
    schema:
      movies: *ref_0
  - name: Date
    link: https://www.mongodb.com/docs/atlas/atlas-search/range/#date-example
    pipeline:
      - $search:
          range:
            path: released
            gt: !bson_utcdatetime '2010-01-01T00:00:00.000Z'
            lt: !bson_utcdatetime '2015-01-01T00:00:00.000Z'
      - $limit: 5
      - $project:
          _id: 0
          title: 1
          released: 1
    schema:
      movies: *ref_0
  - name: ObjectId
    link: https://www.mongodb.com/docs/atlas/atlas-search/range/#objectid-example
    pipeline:
      - $search:
          range:
            path: _id
            gte: !bson_objectId '573a1396f29313caabce4a9a'
            lte: !bson_objectId '573a1396f29313caabce4ae7'
      - $project:
          _id: 1
          title: 1
          released: 1
    schema:
      movies: *ref_0
  - name: String
    link: https://www.mongodb.com/docs/atlas/atlas-search/range/#string-example
    pipeline:
      - $search:
          range:
            path: title
            gt: city
            lt: country
      - $limit: 5
      - $project:
          _id: 0
          title: 1
    schema:
      movies: *ref_0
