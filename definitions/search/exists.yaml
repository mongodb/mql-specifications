# $schema: ../../schemas/operator.json
name: exists
link: https://www.mongodb.com/docs/atlas/atlas-search/exists/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The exists operator tests if a path to a specified indexed field name exists in a document.
arguments:
  - name: path
    type:
      - searchPath
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: Basic
    link: https://www.mongodb.com/docs/atlas/atlas-search/exists/#basic-example
    pipeline:
      - $search:
          exists:
            path: type
    schema:
      TestCollection:
        _id:
          types:
            - bsonType: Number
        type:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        quantities:
          types:
            - bsonType: Document
              fields:
                lemons:
                  types:
                    - bsonType: Number
                oranges:
                  types:
                    - bsonType: Number
                grapefruit:
                  types:
                    - bsonType: Number
  - name: Embedded
    link: https://www.mongodb.com/docs/atlas/atlas-search/exists/#embedded-example
    pipeline:
      - $search:
          exists:
            path: quantities.lemons
    schema:
      TestCollection:
        _id:
          types:
            - bsonType: Number
        type:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        quantities:
          types:
            - bsonType: Document
              fields:
                lemons:
                  types:
                    - bsonType: Number
                oranges:
                  types:
                    - bsonType: Number
                grapefruit:
                  types:
                    - bsonType: Number
  - name: Compound
    link: https://www.mongodb.com/docs/atlas/atlas-search/exists/#compound-example
    pipeline:
      - $search:
          compound:
            must:
              - exists:
                  path: type
              - text:
                  query: apple
                  path: type
            should:
              text:
                query: fuji
                path: description
    schema:
      TestCollection:
        _id:
          types:
            - bsonType: Number
        type:
          types:
            - bsonType: String
        description:
          types:
            - bsonType: String
        quantities:
          types:
            - bsonType: Document
              fields:
                lemons:
                  types:
                    - bsonType: Number
                oranges:
                  types:
                    - bsonType: Number
                grapefruit:
                  types:
                    - bsonType: Number
