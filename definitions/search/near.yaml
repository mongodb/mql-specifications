  - name: Compound
    link: https://www.mongodb.com/docs/atlas/atlas-search/near/#compound-example
    pipeline:
      - $search:
          compound:
            must:
              text:
                query: Apartment
                path: property_type
            should:
              near:
                origin:
                  type: Point
                  coordinates:
                    - 114.15027
                    - 22.28158
                pivot: 1000
                path: address.location
      - $limit: 3
      - $project:
