# $schema: ../../schemas/operator.json
name: near
link: https://www.mongodb.com/docs/atlas/atlas-search/near/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The near operator supports querying and scoring numeric, date, and GeoJSON point values.
arguments:
  - name: path
    type:
      - searchPath
  - name: origin
    type:
      - date
      - number
      - geometry
  - name: pivot
    type:
      - number
  - name: score
    optional: true
    type:
      - searchScore
tests:
  - name: Number
    link: https://www.mongodb.com/docs/atlas/atlas-search/near/#number-example
    pipeline:
      - $search:
          index: runtimes
          near:
            path: runtime
            origin: 279
            pivot: 2
      - $limit: 7
      - $project:
          _id: 0
          title: 1
          runtime: 1
          score:
            $meta: searchScore
    schema:
      movies: &ref_0
        _id:
          types:
            - bsonType: Document
              fields:
                $oid:
                  types:
                    - bsonType: String
        title:
          types:
            - bsonType: String
        year:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        runtime:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        released:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        poster:
          types:
            - bsonType: String
        plot:
          types:
            - bsonType: String
        fullplot:
          types:
            - bsonType: String
        lastupdated:
          types:
            - bsonType: String
        type:
          types:
            - bsonType: String
        directors:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        imdb:
          types:
            - bsonType: Document
              fields:
                rating:
                  types:
                    - bsonType: Document
                      fields:
                        $numberDouble:
                          types:
                            - bsonType: String
                votes:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
                id:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
        cast:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        countries:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Document
                              fields:
                                $numberDouble:
                                  types:
                                    - bsonType: String
                        numReviews:
                          types:
                            - bsonType: Document
                              fields:
                                $numberInt:
                                  types:
                                    - bsonType: String
                lastUpdated:
                  types:
                    - bsonType: Document
                      fields:
                        $date:
                          types:
                            - bsonType: Document
                              fields:
                                $numberLong:
                                  types:
                                    - bsonType: String
        num_mflix_comments:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
  - name: Date
    link: https://www.mongodb.com/docs/atlas/atlas-search/near/#date-example
    pipeline:
      - $search:
          index: releaseddate
          near:
            path: released
            origin: !bson_utcdatetime '1915-09-13T00:00:00.000+00:00'
            pivot: 7776000000
      - $limit: 3
      - $project:
          _id: 0
          title: 1
          released: 1
          score:
            $meta: searchScore
    schema:
      movies: *ref_0
  - name: GeoJSON Point
    link: https://www.mongodb.com/docs/atlas/atlas-search/near/#geojson-point-examples
    pipeline:
      - $search:
          near:
            origin:
              type: Point
              coordinates:
                - -8.61308
                - 41.1413
            pivot: 1000
            path: address.location
      - $limit: 3
      - $project:
          _id: 0
          name: 1
          address: 1
          score:
            $meta: searchScore
    schema:
      listingsAndReviews: &ref_1
