            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        bedrooms:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        beds:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        number_of_reviews:
          types:
            - bsonType: Document
