# $schema: ../../schemas/operator.json
name: equals
link: https://www.mongodb.com/docs/atlas/atlas-search/equals/
minVersion: '5.0'
type:
  - searchOperator
encode: object
description: |
  The equals operator checks whether a field matches a value you specify.
arguments:
  - name: path
    type:
      - searchPath
  - name: value
    type:
      - binData
      - bool
      - date
      - objectId
      - 'null'
      - number
      - string
  - name: score
    optional: true
    type:
      - searchScore
  - name: doesNotAffect
    optional: true
    type:
      - string
      - array       # of string
tests:
  - name: Boolean
    link: https://www.mongodb.com/docs/atlas/atlas-search/equals/#boolean-examples
    pipeline:
      - $search:
          equals:
            path: verified_user
            value: true
      - $project:
          name: 1
          _id: 0
          score:
            $meta: searchScore
    schema:
      users:
        _id:
          types:
            - bsonType: ObjectId
        name:
          types:
            - bsonType: String
        verified_user:
          types:
            - bsonType: Boolean
        account:
          types:
            - bsonType: Document
              fields:
                new_user:
                  types:
                    - bsonType: Boolean
                active_user:
                  types:
                    - bsonType: Boolean
        teammates:
          types:
            - bsonType: Array
              types:
                - bsonType: ObjectId
        region:
          types:
            - bsonType: String
        account_created:
          types:
            - bsonType: Date
        employee_number:
          types:
            - bsonType: Number
        uuid:
          types:
            - bsonType: Binary
        job_title:
          types:
            - bsonType: 'Null'
            - bsonType: String
  - name: ObjectId
    link: https://www.mongodb.com/docs/atlas/atlas-search/equals/#objectid-example
    pipeline:
      - $search:
          equals:
            path: teammates
            value: !bson_objectId '5a9427648b0beebeb69589a1'
    schema:
      users:
        _id:
          types:
            - bsonType: ObjectId
        name:
          types:
            - bsonType: String
        verified_user:
          types:
            - bsonType: Boolean
        account:
          types:
            - bsonType: Document
              fields:
                new_user:
                  types:
                    - bsonType: Boolean
                active_user:
                  types:
                    - bsonType: Boolean
        teammates:
          types:
            - bsonType: Array
              types:
                - bsonType: ObjectId
        region:
          types:
            - bsonType: String
        account_created:
          types:
            - bsonType: Date
        employee_number:
          types:
            - bsonType: Number
        uuid:
          types:
            - bsonType: Binary
        job_title:
          types:
            - bsonType: 'Null'
            - bsonType: String
  - name: Date
    link: https://www.mongodb.com/docs/atlas/atlas-search/equals/#date-example
    pipeline:
      - $search:
          equals:
            path: account_created
            value: !bson_utcdatetime '2022-05-04T05:01:08.000+00:00'
    schema:
      users:
