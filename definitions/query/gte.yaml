# $schema: ../../schemas/operator.json
name: $gte
link: https://www.mongodb.com/docs/manual/reference/operator/query/gte/
minVersion: '1.0'
type:
  - fieldQuery
encode: single
description: |
  Matches values that are greater than or equal to a specified value.
arguments:
  - name: value
    type:
      - any
tests:
  - name: Match Document Fields
    link: https://www.mongodb.com/docs/manual/reference/operator/query/gte/#match-document-fields
    pipeline:
      - $match:
          qty:
            $gte: 20
    schema:
      inventory:
        price:
          types:
            - bsonType: Double
        qty:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        quantity:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        sale:
          types:
            - bsonType: Boolean
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
