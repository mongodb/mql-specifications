# $schema: ../../schemas/operator.json
name: $eq
link: https://www.mongodb.com/docs/manual/reference/operator/query/eq/
minVersion: '3.0'
type:
  - fieldQuery
encode: single
description: |
  Matches values that are equal to a specified value.
arguments:
  - name: value
    type:
      - any
tests:
  - name: Equals a Specified Value
    link: https://www.mongodb.com/docs/manual/reference/operator/query/eq/#equals-a-specified-value
    pipeline:
      - $match:
          qty:
            $eq: 20
    schema:
      inventory:
        _id:
          types:
            - bsonType: Number
        item:
          types:
            - bsonType: Document
              fields:
                name:
                  types:
                    - bsonType: String
                code:
                  types:
                    - bsonType: String
        qty:
          types:
            - bsonType: Number
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
                - bsonType: Array
                  types:
                    - bsonType: String
  - name: Field in Embedded Document Equals a Value
    link: https://www.mongodb.com/docs/manual/reference/operator/query/eq/#field-in-embedded-document-equals-a-value
    pipeline:
      - $match:
          item.name:
            $eq: ab
    schema:
      inventory:
        _id:
          types:
            - bsonType: Number
        item:
          types:
            - bsonType: Document
              fields:
                name:
                  types:
                    - bsonType: String
                code:
                  types:
                    - bsonType: String
        qty:
          types:
            - bsonType: Number
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
                - bsonType: Array
                  types:
                    - bsonType: String
  - name: Equals an Array Value
    link: https://www.mongodb.com/docs/manual/reference/operator/query/eq/#equals-an-array-value
    pipeline:
      - $match:
          tags:
            $eq:
              - A
              - B
    schema:
      inventory:
        _id:
          types:
            - bsonType: Number
        item:
          types:
            - bsonType: Document
              fields:
                name:
                  types:
                    - bsonType: String
                code:
                  types:
                    - bsonType: String
        qty:
          types:
            - bsonType: Number
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
                - bsonType: Array
                  types:
                    - bsonType: String
  - name: Regex Match Behaviour
    link: https://www.mongodb.com/docs/manual/reference/operator/query/eq/#regex-match-behaviour
    pipeline:
      - $match:
          company: MongoDB
      - $match:
          company:
            $eq: MongoDB
      - $match:
          company: !bson_regex '^MongoDB'
      - $match:
          company:
            $eq: !bson_regex '^MongoDB'
    schema:
      companies:
        _id:
          types:
            - bsonType: Int32
        company:
          types:
            - bsonType: String
