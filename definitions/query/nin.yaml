# $schema: ../../schemas/operator.json
name: $nin
link: https://www.mongodb.com/docs/manual/reference/operator/query/nin/
minVersion: '1.0'
type:
  - fieldQuery
encode: single
description: |
  Matches none of the values specified in an array.
arguments:
  - name: value
    type:
      - array       # of expression
tests:
  - name: Select on Unmatching Documents
    link: https://www.mongodb.com/docs/manual/reference/operator/query/nin/#select-on-unmatching-documents
    pipeline:
      - $match:
          quantity:
            $nin:
              - 5
              - 15
    schema:
      inventory: &ref_0
        price:
          types:
            - bsonType: Double
        qty:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        quantity:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        sale:
          types:
            - bsonType: Boolean
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
  - name: Select on Elements Not in an Array
    link: https://www.mongodb.com/docs/manual/reference/operator/query/nin/#select-on-elements-not-in-an-array
    pipeline:
      - $match:
          tags:
            $nin:
              - school
    schema:
      inventory: *ref_0
