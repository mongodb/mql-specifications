# $schema: ../../schemas/operator.json
name: $size
link: https://www.mongodb.com/docs/manual/reference/operator/query/size/
minVersion: '1.0'
type:
  - fieldQuery
encode: single
description: |
  Selects documents if the array field is a specified size.
arguments:
  - name: value
    type:
      - int
tests:
  - name: Query an Array by Array Length
    link: https://www.mongodb.com/docs/manual/tutorial/query-arrays/#query-an-array-by-array-length
    pipeline:
      - $match:
          tags:
            $size: 3
    schema:
      inventory:
        price:
          types:
            - bsonType: Double
        qty:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        quantity:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        sale:
          types:
            - bsonType: Boolean
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
