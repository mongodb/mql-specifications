# $schema: ../../schemas/operator.json
name: $or
link: https://www.mongodb.com/docs/manual/reference/operator/query/or/
minVersion: '1.0'
type:
  - query
encode: single
description: |
  Joins query clauses with a logical OR returns all documents that match the conditions of either clause.
arguments:
  - name: queries
    type:
      - query
    variadic: array
    variadicMin: 1
tests:
  - name: $or Clauses
    link: https://www.mongodb.com/docs/manual/reference/operator/query/or/#-or-clauses-and-indexes
    pipeline:
      - $match:
          $or:
            - quantity:
                $lt: 20
            - price: 10
    schema:
      inventory:
        price:
          types:
            - bsonType: Double
        qty:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        quantity:
          types:
            - bsonType: Int32
            - bsonType: Undefined
        sale:
          types:
            - bsonType: Boolean
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
  - name: Error Handling
    link: https://www.mongodb.com/docs/manual/reference/operator/query/or/#error-handling
    pipeline:
      - $match:
          $or:
            - x:
                $eq: 0
            - $expr:
                $eq:
                  - $divide:
                      - 1
                      - $x
                  - 3
    schema:
      example:
        x:
          types:
            - bsonType: Int32
