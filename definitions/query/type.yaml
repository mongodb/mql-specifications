# $schema: ../../schemas/operator.json
name: $type
link: https://www.mongodb.com/docs/manual/reference/operator/query/type/
minVersion: '3.2'
type:
  - fieldQuery
encode: single
description: |
  Selects documents if a field is of the specified type.
arguments:
  - name: type
    type:
      - int
      - string
    variadic: array
tests:
  - name: Querying by Data Type
    link: https://www.mongodb.com/docs/manual/reference/operator/query/type/#querying-by-data-type
    pipeline:
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 2
            $type:
              - 2
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'string'
            $type:
              - string
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 1
            $type:
              - 1
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'double'
            $type:
              - double
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'number'
            $type:
              - number
    schema:
      addressBook: &ref_0
        _id:
          types:
            - bsonType: Int32
        address:
          types:
            - bsonType: String
        zipCode:
          types:
            - bsonType: String
            - bsonType: Int32
            - bsonType: Double
            - bsonType: Array
              types:
                - bsonType: String
  - name: Querying by Multiple Data Type
    link: https://www.mongodb.com/docs/manual/reference/operator/query/type/#querying-by-multiple-data-type
    pipeline:
      - $match:
          zipCode:
            $type:
              - 2
              - 1
      - $match:
          zipCode:
            $type:
              - string
              - double
    schema: '// TODO: No schema found in docs'
  - name: Querying by MinKey and MaxKey
    link: https://www.mongodb.com/docs/manual/reference/operator/query/type/#querying-by-minkey-and-maxkey
    pipeline:
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'minKey'
            $type:
              - minKey
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'maxKey'
            $type:
              - maxKey
    schema:
      restaurants:
        _id:
          types:
            - bsonType: Number
        address:
          types:
            - bsonType: Document
              fields:
                building:
                  types:
                    - bsonType: String
                coord:
                  types:
                    - bsonType: Array
                      types:
                        - bsonType: Number
                street:
                  types:
                    - bsonType: String
                zipcode:
                  types:
                    - bsonType: String
        borough:
          types:
            - bsonType: String
        cuisine:
          types:
            - bsonType: String
        grades:
          types:
            - bsonType: Array
              types:
                - bsonType: Document
                  fields:
                    date:
                      types:
                        - bsonType: Date
                    grade:
                      types:
                        - bsonType: String
                        - bsonType: MinKey
                    score:
                      types:
                        - bsonType: Number
        name:
          types:
            - bsonType: String
        restaurant_id:
          types:
            - bsonType: String
  - name: Querying by Array Type
    link: https://www.mongodb.com/docs/manual/reference/operator/query/type/#querying-by-array-type
    pipeline:
      - $match:
          zipCode:
            # Example uses the short form, the builder always generates the verbose form
            # $type: 'array'
            $type:
              - array
    schema:
      addressBook: *ref_0
