# $schema: ../../schemas/operator.json
name: $all
link: https://www.mongodb.com/docs/manual/reference/operator/query/all/
minVersion: '2.0'
type:
  - fieldQuery
encode: single
description: |
  Matches arrays that contain all elements specified in the query.
arguments:
  - name: value
    type:
      - fieldQuery
    variadic: array
tests:
  - name: Use $all to Match Values
    link: https://www.mongodb.com/docs/manual/reference/operator/query/all/#use--all-to-match-values
    pipeline:
      - $match:
          tags:
            $all:
              - appliance
              - school
              - book
    schema:
      inventory:
        _id:
          types:
            - bsonType: ObjectId
        code:
          types:
            - bsonType: String
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        qty:
          types:
            - bsonType: Array
              types:
                - bsonType: Document
                  fields:
                    size:
                      types:
                        - bsonType: String
                    num:
                      types:
                        - bsonType: Number
                    color:
                      types:
                        - bsonType: String
  - name: Use $all with $elemMatch
    link: https://www.mongodb.com/docs/manual/reference/operator/query/all/#use--all-with--elemmatch
    pipeline:
      - $match:
          qty:
            $all:
              - $elemMatch:
                  size: M
                  num:
                    $gt: 50
              - $elemMatch:
                  num: 100
                  color: green
    schema:
      inventory:
        _id:
          types:
            - bsonType: ObjectId
        code:
          types:
            - bsonType: String
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        qty:
          types:
            - bsonType: Array
              types:
                - bsonType: Document
                  fields:
                    size:
                      types:
                        - bsonType: String
                    num:
                      types:
                        - bsonType: Number
                    color:
                      types:
                        - bsonType: String
