# $schema: ../../schemas/operator.json
name: $expr
link: https://www.mongodb.com/docs/manual/reference/operator/query/expr/
minVersion: '3.6'
type:
  - query
encode: single
description: |
  Allows use of aggregation expressions within the query language.
arguments:
  - name: expression
    type:
      - expression
tests:
  - name: Compare Two Fields from A Single Document
    link: https://www.mongodb.com/docs/manual/reference/operator/query/expr/#compare-two-fields-from-a-single-document
    pipeline:
      - $match:
          $expr:
            $gt:
              - $spent
              - $budget
    schema:
      TestCollection:
        title:
          types:
            - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Number
  - name: Using $expr With Conditional Statements
    link: https://www.mongodb.com/docs/manual/reference/operator/query/expr/#using--expr-with-conditional-statements
    pipeline:
      - $match:
          $expr:
            $lt:
              - $cond:
                  if:
                    $gte:
                      - $qty
                      - 100
                  then:
                    $multiply:
                      - $price
                      - 0.5
                  else:
                    $multiply:
                      - $price
                      - 0.75
              - 5
    schema: '// TODO: No schema found in docs'
