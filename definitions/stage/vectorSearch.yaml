# $schema: ../../schemas/operator.json
name: $vectorSearch
link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/
minVersion: '6.0'
type:
  - inputStage
encode: object
description: |
  The $vectorSearch stage performs an ANN or ENN search on a vector in the specified field.
arguments:
  - name: index
    type:
      - string
    description: |
      Name of the Atlas Vector Search index to use.
  - name: limit
    type:
      - int
    description: |
      Number of documents to return in the results. This value can't exceed the value of numCandidates if you specify numCandidates.
  - name: path
    type:
      - string
    description: |
      Indexed vector type field to search.
  - name: queryVector
    type:
      - array       # of numbers
      - binData
    description: |
      Array of numbers or a BinData value that represent the query vector. The number type
      must match the indexed field value type.
  - name: exact
    optional: true
    type:
      - bool
    description: |
      This is required if numCandidates is omitted. false to run ANN search. true to run ENN search.
  - name: filter
    optional: true
    type:
      - query
    description: |
      Any match query that compares an indexed field with a boolean, date, objectId, number, string, or UUID to use as a pre-filter.
  - name: numCandidates
    optional: true
    type:
      - int
    description: |
      This field is required if exact is false or omitted.
      Number of nearest neighbors to use during the search. Value must be less than or equal to (<=) 10000. You can't specify a number less than the number of documents to return (limit).
  - name: returnStoredSource
    optional: true
    type:
      - bool
    description: |
      If true, the search returns only the stored source fields configured on the index directly from the index and skips a full document lookup. If omitted, the default value is false.
  - name: nestedOptions
    optional: true
    type:
      - object
    description: |
      Configure how MongoDB Vector Search scores documents that contain nested arrays.
    arguments:
      - name: scoreMode
        optional: true
        type:
          - string
        description: |
          Specifies how to score documents that contain nested arrays. Value can be avg or max.
  - name: parentFilter
    optional: true
    type:
      - query
    description: |
      Any match query that compares an indexed top-level field with a boolean, date, objectId, number, string, or UUID to use as a pre-filter. Only valid if `nestedRoot` is specified in the index definition.
tests:
  - name: ANN Basic
    link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          path: plot_embedding
          queryVector: # skip other numbers, not relevant to the test
            - -0.0016261312
            - -0.028070757
            - -0.011342932
          numCandidates: 150
          limit: 10
      - $project:
          _id: 0
          plot: 1
          title: 1
          score:
            $meta: vectorSearchScore
    schema:
      movies:
        plot_embedding:
          types:
            - bsonType: Array
              types:
                - bsonType: Double
        plot:
          types:
            - bsonType: String
        title:
          types:
            - bsonType: String
  - name: ANN Filter
    link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          path: plot_embedding
          filter:
            $and:
              - year:
                  $lt: 1975
          queryVector: # skip other numbers, not relevant to the test
            - 0.02421053
            - -0.022372592
            - -0.006231137
          numCandidates: 150
          limit: 10
      - $project:
          _id: 0
          title: 1
          plot: 1
          year: 1
          score:
            $meta: vectorSearchScore
    schema:
      movies:
        plot_embedding:
          types:
            - bsonType: Array
              types:
                - bsonType: Double
        year:
          types:
            - bsonType: Int32
        plot:
          types:
            - bsonType: String
        title:
          types:
            - bsonType: String
  - name: ENN
    link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          path: plot_embedding
          queryVector: # skip other numbers, not relevant to the test
            - -0.006954097
            - -0.009932499
            - -0.001311474
          exact: true
          limit: 10
      - $project:
          _id: 0
          plot: 1
          title: 1
          score:
            $meta: vectorSearchScore
    schema:
      movies:
        plot_embedding:
          types:
            - bsonType: Array
              types:
                - bsonType: Double
        plot:
          types:
            - bsonType: String
        title:
          types:
            - bsonType: String
  - name: Stored Source
    link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          path: plot_embedding
          queryVector: # skip other numbers, not relevant to the test
            - -0.03994801267981529
            - -0.016522614285349846
            - -0.008775344118475914
          filter:
            $and:
              - year:
                  $gt: 1970
              - year:
                  $lt: 2020
              - genres:
                  $in:
                    - Action
                    - Drama
                    - Comedy
          limit: 10
          numCandidates: 1000
          returnStoredSource: true
      - $project:
          _id: 0
          plot: 1
          title: 1
          genres: 1
          score:
            $meta: vectorSearchScore
    schema:
      movies:
        plot_embedding:
          types:
            - bsonType: Array
              types:
                - bsonType: Double
        year:
          types:
            - bsonType: Int32
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        plot:
          types:
            - bsonType: String
        title:
          types:
            - bsonType: String
  - name: Nested field
    link: https://www.mongodb.com/docs/atlas/atlas-vector-search/vector-search-stage/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          filter:
            reviews.date:
              $gte: !bson_utcdatetime "2000-01-01"
          parentFilter:
            address.country:
              $in:
                - United States
            bedrooms:
              $gte: 2
              $lte: 3
            property_type:
              $in:
                - House
                - Apartment
          path: reviews.comments_embedding
          queryVector: # skip other numbers, not relevant to the test
            - 0.010745884850621223
            - -0.035673413425683975
            - -0.09298479557037354
          numCandidates: 100
          limit: 5
          nestedOptions:
            scoreMode: avg
      - $project:
          _id: 0
          name: 1
          address: 1
          neighborhood_overview: 1
          bedrooms: 1
          property_type: 1
          reviews.comments: 1
          score:
            $meta: vectorSearchScore
