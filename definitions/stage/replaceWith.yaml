# $schema: ../../schemas/operator.json
name: $replaceWith
link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/replaceWith/
minVersion: '4.2'
type:
  - stage
  - updateStage
encode: single
description: |
  Replaces a document with the specified embedded document. The operation replaces all existing fields in the input document, including the _id field. Specify a document embedded in the input document to promote the embedded document to the top level.
  Alias for $replaceRoot.
arguments:
  - name: expression
    type:
      - resolvesToObject
tests:
  - name: an Embedded Document Field
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/replaceWith/#-replacewith-an-embedded-document-field
    pipeline:
      - $replaceWith:
          $mergeObjects:
            - dogs: 0
              cats: 0
              birds: 0
              fish: 0
            - $pets
    schema:
      people:
        _id:
          types:
            - bsonType: Number
        name:
          types:
            - bsonType: String
        age:
          types:
            - bsonType: Number
        pets:
          types:
            - bsonType: Document
              fields:
                dogs:
                  types:
                    - bsonType: Number
                cats:
                  types:
                    - bsonType: Number
                fish:
                  types:
                    - bsonType: Number
  - name: a Document Nested in an Array
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/replaceWith/#-replacewith-a-document-nested-in-an-array
    pipeline:
      # The builder uses the verbose form of the $unwind operator
      # $unwind: '$grades'
      - $unwind:
          path: $grades
      - $match:
          grades.grade:
            $gte: 90
      - $replaceWith: $grades
    schema:
      students:
        _id:
          types:
            - bsonType: Number
        grades:
          types:
            - bsonType: Array
              types:
                - bsonType: Document
                  fields:
                    test:
                      types:
                        - bsonType: Number
                    grade:
                      types:
                        - bsonType: Number
                    mean:
                      types:
                        - bsonType: Number
                    std:
                      types:
                        - bsonType: Number
  - name: a Newly Created Document
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/replaceWith/#-replacewith-a-newly-created-document
    pipeline:
      - $match:
          status: C
      - $replaceWith:
          _id: $_id
          item: $item
          amount:
            $multiply:
              - $price
              - $quantity
          status: Complete
          asofDate: $$NOW
    schema:
      sales:
        _id:
          types:
            - bsonType: Number
        item:
          types:
            - bsonType: String
        price:
          types:
            - bsonType: Number
        quantity:
          types:
            - bsonType: Number
        date:
          types:
            - bsonType: Date
        status:
          types:
            - bsonType: String
  - name: a New Document Created from $$ROOT and a Default Document
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/replaceWith/#-replacewith-a-new-document-created-from---root-and-a-default-document
    pipeline:
      - $replaceWith:
          $mergeObjects:
            - _id: ''
              name: ''
              email: ''
              cell: ''
              home: ''
            - $$ROOT
    schema:
      contacts:
        _id:
          types:
            - bsonType: Number
        name:
          types:
            - bsonType: String
        email:
          types:
            - bsonType: String
        cell:
          types:
            - bsonType: String
