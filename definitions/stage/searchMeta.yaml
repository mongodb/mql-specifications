# $schema: ../../schemas/operator.json
name: $searchMeta
link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/searchMeta/
minVersion: '5.0'
type:
  - inputStage
encode: object
description: |
  Returns different types of metadata result documents for the Atlas Search query against an Atlas collection.
  NOTE: $searchMeta is only available for MongoDB Atlas clusters running MongoDB v4.4.9 or higher, and is not available for self-managed deployments.
arguments:
  - name: operator
    mergeObject: true
    type:
      - searchOperator
    description: |
      Operator to search with.  You can provide a specific operator or use
      the compound operator to run a compound query with multiple operators.
  - name: index
    optional: true
    type:
      - string
    description: |
      Name of the Atlas Search index to use. If omitted, defaults to default.
  - name: count
    optional: true
    type:
      - object
    description: |
      Document that specifies the count options for retrieving a count of the results.
  - name: returnScope
    optional: true
    type:
      - object
    description: |
      Object that sets the context of the query to the specified embedded document field. You must also specify `returnStoredSource` and set it to `true` if your cluster MongoDB version is less than 8.2.
  - name: returnStoredSource
    optional: true
    type:
      - bool
    description: |
      Flag that specifies whether to perform a full document lookup on the backend database or return only stored source fields directly from Atlas Search.
tests:
  - name: Example
    link: https://www.mongodb.com/docs/atlas/atlas-search/query-syntax/#example
    pipeline:
      - $searchMeta:
          range:
            path: year
            gte: 1998
            lt: 1999
          count:
            type: total
    schema:
      movies: &ref_0
        _id:
          types:
            - bsonType: Document
              fields:
                $oid:
                  types:
                    - bsonType: String
        title:
          types:
            - bsonType: String
        year:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        runtime:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
        released:
          types:
            - bsonType: Document
              fields:
                $date:
                  types:
                    - bsonType: Document
                      fields:
                        $numberLong:
                          types:
                            - bsonType: String
        poster:
          types:
            - bsonType: String
        plot:
          types:
            - bsonType: String
        fullplot:
          types:
            - bsonType: String
        lastupdated:
          types:
            - bsonType: String
        type:
          types:
            - bsonType: String
        directors:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        imdb:
          types:
            - bsonType: Document
              fields:
                rating:
                  types:
                    - bsonType: Document
                      fields:
                        $numberDouble:
                          types:
                            - bsonType: String
                votes:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
                id:
                  types:
                    - bsonType: Document
                      fields:
                        $numberInt:
                          types:
                            - bsonType: String
        cast:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        countries:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        genres:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        tomatoes:
          types:
            - bsonType: Document
              fields:
                viewer:
                  types:
                    - bsonType: Document
                      fields:
                        rating:
                          types:
                            - bsonType: Document
                              fields:
                                $numberDouble:
                                  types:
                                    - bsonType: String
                        numReviews:
                          types:
                            - bsonType: Document
                              fields:
                                $numberInt:
                                  types:
                                    - bsonType: String
                lastUpdated:
                  types:
                    - bsonType: Document
                      fields:
                        $date:
                          types:
                            - bsonType: Document
                              fields:
                                $numberLong:
                                  types:
                                    - bsonType: String
        num_mflix_comments:
          types:
            - bsonType: Document
              fields:
                $numberInt:
                  types:
                    - bsonType: String
  - name: Year Facet
    link: https://www.mongodb.com/docs/atlas/atlas-search/facet/#example-1
    pipeline:
      - $searchMeta:
          facet:
            operator:
              range:
                path: year
                gte: 1980
                lte: 2000
            facets:
              yearFacet:
                type: number
                path: year
                boundaries:
                  - 1980
                  - 1990
                  - 2000
                default: other
    schema:
      movies: *ref_0
  - name: Date Facet
    link: https://www.mongodb.com/docs/atlas/atlas-search/facet/#example-2
    pipeline:
      - $searchMeta:
          facet:
            operator:
              range:
                path: released
                gte: !bson_utcdatetime '2000-01-01T00:00:00.000Z'
                lte: !bson_utcdatetime '2015-01-31T00:00:00.000Z'
            facets:
              yearFacet:
                type: date
                path: released
                boundaries:
                  - !bson_utcdatetime '2000-01-01'
                  - !bson_utcdatetime '2005-01-01'
                  - !bson_utcdatetime '2010-01-01'
                  - !bson_utcdatetime '2015-01-01'
                default: other
    schema:
      movies: *ref_0
  - name: Metadata Results
    link: https://www.mongodb.com/docs/atlas/atlas-search/facet/#examples
    pipeline:
      - $searchMeta:
          facet:
            operator:
              range:
                path: released
                gte: !bson_utcdatetime '2000-01-01T00:00:00.000Z'
                lte: !bson_utcdatetime '2015-01-31T00:00:00.000Z'
            facets:
              directorsFacet:
                type: string
                path: directors
                numBuckets: 7
              yearFacet:
                type: number
                path: year
                boundaries:
                  - 2000
                  - 2005
                  - 2010
                  - 2015
    schema:
      movies: *ref_0
  - name: Autocomplete Bucket Results through Facet Queries
    link: https://www.mongodb.com/docs/atlas/atlas-search/autocomplete/#bucket-results-through-facet-queries
    pipeline:
      - $searchMeta:
          facet:
            operator:
              autocomplete:
                path: title
                query: Gravity
            facets:
              titleFacet:
                type: string
                path: title
    schema:
      movies: *ref_0
