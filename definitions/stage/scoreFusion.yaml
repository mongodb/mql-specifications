# $schema: ../../schemas/operator.json
name: $scoreFusion
link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/scoreFusion/
minVersion: '8.0'
type:
  - stage
encode: object
description: |
  Combines multiple pipelines using relative score fusion to create hybrid search results.
arguments:
  - name: input
    type:
      - object
    description: |
      An object that specifies the pipelines to combine with score fusion.
    arguments:
      - name: pipelines
        type:
          - pipeline
        variadic: object
        variadicMin: 1
        description: |
          Map from name to input pipeline. Each pipeline must be operating on the same collection.
      - name: normalization
        type:
          - string
        description: |
          Normalizes the score to the range 0 to 1 before combining the results. Value can be none, sigmoid or minMaxScaler.
  - name: combination
    optional: true
    type:
      - object
    description: |
      An object that specifies how to combine the scores.
    arguments:
      - name: weights
        optional: true
        type:
          - number
        variadic: object
        description: |
          Map from pipeline name to weight (non-negative number). If unspecified, default weight is 1 for each pipeline.
      - name: method
        optional: true
        type:
          - string
        description: |
          Specifies method for combining scores. Value can be avg or expression. Default is avg.
      - name: expression
        optional: true
        type:
          - expression
        description: |
          Custom expression used when combination.method is set to expression.
  - name: scoreDetails
    type:
      - bool
    default: false
    description: Set to true to include detailed scoring information.
tests:
  - name: Example
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/scoreFusion/#examples
    pipeline:
      - $scoreFusion:
          input:
            pipelines:
              searchOne:
                - $vectorSearch:
                    index: vector_index
                    path: plot_embedding
                    queryVector:
                      - -0.0016261312
                      - -0.028070757
                      - -0.011342932
                    numCandidates: 150
                    limit: 10
              searchTwo:
                - $search:
                    index: <INDEX_NAME>
                    text:
                      query: <QUERY_TERM>
                      path: <FIELD_NAME>
            normalization: sigmoid
          combination:
            method: expression
            expression:
              $sum:
                - $multiply:
                    - $$searchOne
                    - 10
                - $$searchTwo
          scoreDetails: true
      - $project:
          _id: 1
          title: 1
          plot: 1
          scoreDetails:
            $meta: scoreDetails
      - $limit: 20
