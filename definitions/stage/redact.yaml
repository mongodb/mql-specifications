# $schema: ../../schemas/operator.json
name: $redact
link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/redact/
minVersion: '2.6'
type:
  - stage
encode: single
description: |
  Reshapes each document in the stream by restricting the content for each document based on information stored in the documents themselves. Incorporates the functionality of $project and $match. Can be used to implement field level redaction. For each input document, outputs either one or zero documents.
arguments:
  - name: expression
    type:
      - expression
tests:
  - name: Evaluate Access at Every Document Level
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/redact/#evaluate-access-at-every-document-level
    pipeline:
      - $match:
          year: 2014
      - $redact:
          $cond:
            if:
              $gt:
                - $size:
                    $setIntersection:
                      - $tags
                      -   - STLW
                          - G
                - 0
            then: $$DESCEND
            else: $$PRUNE
    schema:
      forecasts:
        _id:
          types:
            - bsonType: Number
        title:
          types:
            - bsonType: String
        tags:
          types:
            - bsonType: Array
              types:
                - bsonType: String
        year:
          types:
            - bsonType: Number
        subsections:
          types:
            - bsonType: Array
              types:
                - bsonType: Document
                  fields:
                    subtitle:
                      types:
                        - bsonType: String
                    tags:
                      types:
                        - bsonType: Array
                          types:
                            - bsonType: String
                    content:
                      types:
                        - bsonType: String
                        - bsonType: Document
                          fields:
                            text:
                              types:
                                - bsonType: String
                            tags:
                              types:
                                - bsonType: Array
                                  types:
                                    - bsonType: String
  - name: Exclude All Fields at a Given Level
    link: https://www.mongodb.com/docs/manual/reference/operator/aggregation/redact/#exclude-all-fields-at-a-given-level
    pipeline:
      - $match:
          status: A
      - $redact:
          $cond:
            if:
              $eq:
                - $level
                - 5
            then: $$PRUNE
            else: $$DESCEND
    schema:
      accounts:
        _id:
          types:
            - bsonType: Number
        level:
          types:
            - bsonType: Number
        acct_id:
          types:
            - bsonType: String
        cc:
          types:
            - bsonType: Document
              fields:
                level:
                  types:
                    - bsonType: Number
                type:
                  types:
                    - bsonType: String
                num:
                  types:
                    - bsonType: Number
                exp_date:
                  types:
                    - bsonType: Date
                billing_addr:
                  types:
                    - bsonType: Document
                      fields:
                        level:
                          types:
                            - bsonType: Number
                        addr1:
                          types:
                            - bsonType: String
                        city:
                          types:
                            - bsonType: String
                shipping_addr:
                  types:
                    - bsonType: Array
                      types:
                        - bsonType: Document
                          fields:
                            level:
                              types:
                                - bsonType: Number
                            addr1:
                              types:
                                - bsonType: String
                            city:
                              types:
                                - bsonType: String
        status:
          types:
            - bsonType: String
