name: Create PR from Jira Ticket

# Triggered by Jira Automation via GitHub REST API:
# POST /repos/{owner}/{repo}/actions/workflows/create-pr.yml/dispatches
#
# Two Jira Automation rules should call this workflow:
#   1. Trigger: Issue created + Condition: Label = mql-spec + Project = DRIVERS
#   2. Trigger: Label added = mql-spec + Condition: Project = DRIVERS
#
# Only the ticket key is required — full details are fetched directly from Jira.
on:
  workflow_dispatch:
    inputs:
      key:
        description: "Jira ticket key (e.g. DRIVERS-42)"
        required: true

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: ${{ startsWith(inputs.key, 'DRIVERS-') }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run MQL spec agent
        id: agent
        run: node .github/scripts/generate-pr.js
        env:
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          JIRA_PAT: ${{ secrets.JIRA_PAT }}
          DOCS_GITHUB_TOKEN: ${{ secrets.DOCS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_KEY: ${{ inputs.key }}
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Create branch, commit spec files, and open draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.agent.outputs.branch_name }}
          PR_TITLE: ${{ steps.agent.outputs.pr_title }}
          FILES_WRITTEN: ${{ steps.agent.outputs.files_written }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If a PR already exists for this branch, skip
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for branch $BRANCH_NAME. Nothing to do."
            exit 0
          fi

          git checkout -b "$BRANCH_NAME"

          # Stage only the files written by the agent
          for f in $FILES_WRITTEN; do
            git add "$f"
          done

          git commit -m "$PR_TITLE"
          git push origin "$BRANCH_NAME"

          JIRA_URL="https://jira.mongodb.org/browse/${{ inputs.key }}"
          {
            echo "## Summary"
            echo ""
            echo "Generated from Jira ticket [${{ inputs.key }}]($JIRA_URL)."
            echo ""
            echo "## Files"
            echo ""
            for f in $FILES_WRITTEN; do echo "- \`$f\`"; done
            echo ""
            echo "## Jira"
            echo ""
            echo "$JIRA_URL"
          } > /tmp/pr_body.md

          gh pr create \
            --draft \
            --title "$PR_TITLE" \
            --body-file /tmp/pr_body.md \
            --head "$BRANCH_NAME" \
            --base main

          echo "✅ Draft PR created for ${{ inputs.key }}"
