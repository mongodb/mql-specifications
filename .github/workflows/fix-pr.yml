name: Fix PR from Review

# Two triggers:
# 1. Automatic: reviewer submits "Request changes" on a drivers- branch PR
# 2. Manual: enter a PR number in the GitHub Actions UI
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to fix"
        required: true

jobs:
  fix-spec:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.review.state == 'changes_requested' &&
       startsWith(github.event.pull_request.head.ref, 'drivers-'))
    permissions:
      contents: write
      pull-requests: read
      issues: write

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          PR_BRANCH=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json title --jq '.title')

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect PR review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments \
            --jq '[.[] | {path: .path, line: .line, body: .body, user: .user.login}]' \
            > /tmp/review_comments.json

          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo '${{ toJson(github.event.review.body) }}' > /tmp/review_body.json
          else
            echo '""' > /tmp/review_body.json
          fi

          echo "Review comments collected:"
          cat /tmp/review_comments.json

      - name: Run fix agent
        env:
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: node .github/scripts/fix-pr.js

      - name: Commit and push fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "Apply review corrections"
          git push origin "$PR_BRANCH"
          echo "✅ Fixes pushed to $PR_BRANCH"
