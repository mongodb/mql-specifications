name: Fix PR from Review

# Two triggers:
# 1. Automatic: reviewer submits "Request changes" on a drivers- branch PR
# 2. Manual: enter a PR number in the GitHub Actions UI
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to fix"
        required: true

jobs:
  fix-spec:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.review.state == 'changes_requested' &&
       github.event.pull_request.user.login == 'github-actions[bot]' &&
       startsWith(github.event.pull_request.head.ref, 'drivers-') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
          fi

          PR_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json headRefName --jq '.headRefName')
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json title --jq '.title')

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Overlay scripts from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: git fetch origin "$DEFAULT_BRANCH" && git checkout "origin/$DEFAULT_BRANCH" -- .github/scripts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install validation dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts/schema-validator

      - name: Install yamlfix
        run: pip install yamlfix

      - name: Collect PR review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_BODY: ${{ toJson(github.event.review.body) }}
        run: |
          gh api repos/"$GH_REPO"/pulls/"$PR_NUMBER"/comments \
            --jq '[.[] | {path: .path, line: .line, body: .body, user: .user.login}]' \
            > /tmp/review_comments.json

          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            printf '%s' "$REVIEW_BODY" > /tmp/review_body.json
          else
            printf '""' > /tmp/review_body.json
          fi

          echo "Review comments collected:"
          cat /tmp/review_comments.json

      - name: Run fix agent
        env:
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        run: node .github/scripts/fix-pr.js

      - name: Commit and push fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
          ACTOR: ${{ github.actor }}
        run: |
          ACTOR_ID=$(gh api users/"$ACTOR" --jq '.id')
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "Apply review corrections"
          git push origin "$PR_BRANCH"
          echo "✅ Fixes pushed to $PR_BRANCH"
